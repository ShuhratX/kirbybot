<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buyurtma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --accent: #0ea5e9;
  --accent-dark: #0284c7;
  --accent-light: #e0f2fe;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --green: #22c55e;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Steps ── */
.step { display: none; flex-direction: column; min-height: 100vh; }
.step.active { display: flex; }

/* ── Header ── */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 16px; position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 10px;
}
.back-btn {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--bg); border: 1px solid var(--border);
  font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.header h2 { font-size: 1rem; font-weight: 700; flex: 1; }
.lang-btn {
  background: var(--accent-light); border: none; border-radius: 8px;
  padding: 5px 10px; font-size: .8rem; font-weight: 600;
  color: var(--accent-dark); cursor: pointer; flex-shrink: 0;
}

/* ── Body ── */
.body { padding: 14px 16px; flex: 1; }

/* ── Products ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}
.card img { width: 100%; height: 110px; object-fit: cover; background: var(--accent-light); }
.card-body { padding: 10px; }
.card-name { font-size: .85rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
.card-price { font-size: .88rem; font-weight: 700; color: var(--accent-dark); margin-bottom: 8px; }
.qty-row { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: var(--accent); color: #fff; font-size: 1rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.qty-btn.minus { background: #f1f5f9; color: var(--text); }
.qty-num { font-weight: 700; font-size: .95rem; min-width: 18px; text-align: center; }

/* ── Cart bar ── */
.cart-bar {
  position: fixed; bottom: 16px; left: 12px; right: 12px;
  background: var(--accent); border-radius: 14px; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  color: #fff; font-weight: 700; font-size: .95rem; cursor: pointer; z-index: 50;
  box-shadow: 0 4px 20px rgba(14,165,233,.4);
  transition: opacity .2s, transform .2s;
}
.cart-bar.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }
.cart-count { background: rgba(255,255,255,.25); border-radius: 20px; padding: 2px 8px; font-size: .8rem; }

/* ── Cart items ── */
.cart-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.cart-item:last-child { border-bottom: none; }
.cart-item img { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
.ci-info { flex: 1; }
.ci-name { font-size: .85rem; font-weight: 600; }
.ci-price { font-size: .8rem; color: var(--muted); margin-top: 2px; }
.ci-remove {
  width: 28px; height: 28px; border-radius: 7px;
  background: #fee2e2; border: none; cursor: pointer; color: #ef4444;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.total-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0 4px; font-weight: 700; font-size: 1rem;
}
.total-val { color: var(--accent-dark); font-size: 1.1rem; }

/* ── Fields ── */
.field { margin-bottom: 14px; }
.field-label { font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
.field-input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: inherit; font-size: .95rem; background: var(--surface);
  outline: none; transition: border-color .2s;
}
.field-input:focus { border-color: var(--accent); }

/* ── Map ── */
#map {
  width: 100%; height: 260px; border-radius: var(--radius);
  border: 1.5px solid var(--border); margin-bottom: 8px; z-index: 1;
}
.map-hint { font-size: .78rem; color: var(--muted); margin-bottom: 10px; }
.coords-display { font-size: .78rem; color: var(--muted); text-align: center; margin-bottom: 10px; min-height: 16px; }

/* ── Payment card ── */
.pay-card {
  background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
  border-radius: 16px; padding: 20px; color: #fff; margin-bottom: 14px;
}
.pay-card-owner { font-size: .8rem; opacity: .8; }
.pay-card-num { font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; margin: 8px 0; }
.copy-btn {
  background: rgba(255,255,255,.2); border: none; border-radius: 7px;
  color: #fff; padding: 4px 12px; font-size: .8rem; font-weight: 600; cursor: pointer;
}

/* ── Screenshot ── */
.upload-area {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 24px 16px; text-align: center; cursor: pointer;
  background: var(--bg); transition: border-color .2s; margin-bottom: 14px;
}
.upload-area:active { border-color: var(--accent); }
.upload-area.has-file { border-color: var(--green); background: #f0fdf4; }
.upload-icon { font-size: 2rem; margin-bottom: 6px; }
.upload-text { font-size: .85rem; font-weight: 600; color: var(--muted); }
#screenshot-input { display: none; }
#preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }

/* ── Button ── */
.btn-primary {
  width: 100%; padding: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 12px; font-family: inherit;
  font-size: .95rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s; margin-top: 4px;
}
.btn-primary:active { opacity: .85; }
.btn-primary:disabled { opacity: .45; cursor: not-allowed; }

/* ── Success ── */
.success-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 24px; text-align: center;
}
.success-icon { font-size: 5rem; animation: pop .4s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
.success-title { font-size: 1.3rem; font-weight: 700; margin: 14px 0 6px; }
.success-sub { color: var(--muted); font-size: .9rem; }

/* ── Loading ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; flex-direction: column; gap: 12px;
  color: var(--muted); font-size: .9rem;
}
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.bottom-pad { height: 80px; }
</style>
</head>
<body>

<div id="step-loading" class="loading">
  <div class="spinner"></div>
  <span>Yuklanmoqda...</span>
</div>

<!-- Step 1: Products -->
<div class="step" id="step-products">
  <div class="header">
    <h2 id="h-products"></h2>
    <button class="lang-btn" id="btn-lang" onclick="toggleLang()">RU</button>
  </div>
  <div class="body">
    <div class="grid" id="products-grid"></div>
    <div class="bottom-pad"></div>
  </div>
  <div class="cart-bar hidden" id="cart-bar" onclick="goStep('step-cart')">
    <div style="display:flex;align-items:center;gap:8px">
      🛒 <span id="cb-label"></span>
      <span class="cart-count" id="cb-count"></span>
    </div>
    <span id="cb-total"></span>
  </div>
</div>

<!-- Step 2: Cart -->
<div class="step" id="step-cart">
  <div class="header">
    <button class="back-btn" onclick="goStep('step-products')">←</button>
    <h2 id="h-cart"></h2>
  </div>
  <div class="body">
    <div id="cart-items"></div>
    <div class="total-row">
      <span id="ct-label"></span>
      <span class="total-val" id="ct-val"></span>
    </div>
    <button class="btn-primary" id="btn-cart-next" onclick="goStep('step-phone')"></button>
  </div>
</div>

<!-- Step 3: Phone -->
<div class="step" id="step-phone">
  <div class="header">
    <button class="back-btn" onclick="goStep('step-cart')">←</button>
    <h2 id="h-phone"></h2>
  </div>
  <div class="body">
    <div class="field">
      <div class="field-label" id="lbl-phone"></div>
      <input class="field-input" id="inp-phone" type="tel" maxlength="20">
    </div>
    <button class="btn-primary" id="btn-phone-next" onclick="phoneNext()"></button>
  </div>
</div>

<!-- Step 4: Location -->
<div class="step" id="step-location">
  <div class="header">
    <button class="back-btn" onclick="goStep('step-phone')">←</button>
    <h2 id="h-location"></h2>
  </div>
  <div class="body">
    <p class="map-hint" id="lbl-map-hint"></p>
    <div id="map"></div>
    <div class="coords-display" id="coords-display"></div>
    <button class="btn-primary" id="btn-loc-next" onclick="locationNext()"></button>
  </div>
</div>

<!-- Step 5: Payment -->
<div class="step" id="step-payment">
  <div class="header">
    <button class="back-btn" onclick="goStep('step-location')">←</button>
    <h2 id="h-payment"></h2>
  </div>
  <div class="body">
    <div class="pay-card">
      <div class="pay-card-owner" id="p-owner"></div>
      <div class="pay-card-num"   id="p-num"></div>
      <button class="copy-btn" id="p-copy" onclick="copyCard()"></button>
    </div>

    <div class="field">
      <div class="field-label" id="lbl-comment"></div>
      <textarea class="field-input" id="inp-comment" rows="2" style="resize:none"></textarea>
    </div>

    <button class="btn-primary" id="btn-send" onclick="submitOrder()"></button>
    <div class="bottom-pad"></div>
  </div>
</div>

<!-- Step: Success -->
<div class="step" id="step-success">
  <div class="success-screen">
    <div class="success-icon">🎉</div>
    <div class="success-title" id="s-title"></div>
    <div class="success-sub"   id="s-sub"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Config from URL params ────────────────────────────────────────────────────
const params        = new URLSearchParams(location.search);
let   LANG          = params.get("lang")  || "uz";
const PAYMENT_CARD  = params.get("card")  || "";
const PAYMENT_OWNER = params.get("owner") || "";

let PRODUCTS = [];
const cart   = {}; // { id: qty }

let markerLat = null, markerLng = null;
let screenshotB64 = null;
let map = null, leafMarker = null;

// ── Translations ──────────────────────────────────────────────────────────────
const TX = {
  uz: {
    title: "Mahsulotlar", cart: "Savat", total: "Jami:",
    order: "Buyurtma berish",
    phone: "Telefon raqam", phone_ph: "+998 90 123 45 67",
    location: "Lokatsiya", map_hint: "Xaritada joylashuvingizni belgilang",
    next_location: "→ Lokatsiyani belgilash",
    next_payment:  "→ To'lovga o'tish",
    payment: "To'lov", copy: "Nusxa olish", copied: "Nusxalandi!",
    screenshot: "To'lov skrinshoti", screenshot_hint: "Rasmni tanlash uchun bosing",
    comment: "Izoh (ixtiyoriy)", comment_ph: "...",
    send: "Buyurtmani yuborish",
    success_title: "Buyurtma qabul qilindi! ✅",
    success_sub: "Tez orada siz bilan bog'lanamiz.",
    err_phone:      "Telefon raqamini to'g'ri kiriting",
    err_location:   "Joylashuvni belgilang",
    err_screenshot: "To'lov skrinshoti yuklang",
    err_cart:       "Savatga mahsulot qo'shing",
    lang_switch: "RU",
  },
  ru: {
    title: "Товары", cart: "Корзина", total: "Итого:",
    order: "Оформить заказ",
    phone: "Номер телефона", phone_ph: "+998 90 123 45 67",
    location: "Местоположение", map_hint: "Укажите местоположение на карте",
    next_location: "→ Указать местоположение",
    next_payment:  "→ Перейти к оплате",
    payment: "Оплата", copy: "Копировать", copied: "Скопировано!",
    screenshot: "Скриншот оплаты", screenshot_hint: "Нажмите для выбора фото",
    comment: "Комментарий (необязательно)", comment_ph: "...",
    send: "Отправить заказ",
    success_title: "Заказ принят! ✅",
    success_sub: "Скоро мы с вами свяжемся.",
    err_phone:      "Введите корректный номер телефона",
    err_location:   "Укажите местоположение",
    err_screenshot: "Загрузите скриншот оплаты",
    err_cart:       "Добавьте товары в корзину",
    lang_switch: "UZ",
  }
};

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    // GitHub Pages: products.json sits in the repo root
    const res = await fetch("products.json");
    if (!res.ok) throw new Error(res.status);
    PRODUCTS = await res.json();
  } catch {
    PRODUCTS = [];
  }
  document.getElementById("step-loading").style.display = "none";
  applyLang();
  renderProducts();
  showStep("step-products");
}

// ── Lang ──────────────────────────────────────────────────────────────────────
function toggleLang() {
  LANG = LANG === "uz" ? "ru" : "uz";
  applyLang();
  renderProducts();
}

function applyLang() {
  const T = TX[LANG];
  setText("h-products",    T.title);
  setText("h-cart",        T.cart);
  setText("ct-label",      T.total);
  setText("btn-cart-next", T.order);
  setText("h-phone",       T.phone);
  setText("lbl-phone",     T.phone);
  setText("btn-phone-next",T.next_location);
  setText("h-location",    T.location);
  setText("lbl-map-hint",  T.map_hint);
  setText("btn-loc-next",  T.next_payment);
  setText("h-payment",     T.payment);
  setText("p-owner",       PAYMENT_OWNER);
  setText("p-num",         PAYMENT_CARD);
  setText("p-copy",        T.copy);
  setText("lbl-screenshot",T.screenshot);
  setText("upload-text",   T.screenshot_hint);
  setText("lbl-comment",   T.comment);
  setText("btn-send",      T.send);
  setText("s-title",       T.success_title);
  setText("s-sub",         T.success_sub);
  setText("btn-lang",      T.lang_switch);
  setText("cb-label",      T.cart);
  document.getElementById("inp-phone").placeholder   = T.phone_ph;
  document.getElementById("inp-comment").placeholder = T.comment_ph;
  updateCartBar();
}

// ── Products ──────────────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById("products-grid");
  grid.innerHTML = "";
  PRODUCTS.forEach(p => {
    const name = LANG === "ru" ? p.name_ru : p.name_uz;
    const qty  = cart[p.id] || 0;
    const div  = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${esc(p.image_url)}" alt="${esc(name)}"
           onerror="this.src='https://placehold.co/300x200/e0f2fe/0284c7?text=?'">
      <div class="card-body">
        <div class="card-name">${esc(name)}</div>
        <div class="card-price">${fmt(p.price)}</div>
        <div class="qty-row">
          <button class="qty-btn minus" onclick="chQty(${p.id},-1)">−</button>
          <span class="qty-num" id="qty-${p.id}">${qty}</span>
          <button class="qty-btn" onclick="chQty(${p.id},1)">+</button>
        </div>
      </div>`;
    grid.appendChild(div);
  });
  updateCartBar();
}

function chQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  if (!cart[id]) delete cart[id];
  const el = document.getElementById("qty-" + id);
  if (el) el.textContent = cart[id] || 0;
  updateCartBar();
}

function cartTotal() {
  return PRODUCTS.reduce((s, p) => s + (cart[p.id] || 0) * Number(p.price), 0);
}

function cartCount() {
  return Object.values(cart).reduce((a, b) => a + b, 0);
}

function updateCartBar() {
  const count = cartCount();
  document.getElementById("cart-bar").classList.toggle("hidden", count === 0);
  setText("cb-count", count);
  setText("cb-total", fmt(cartTotal()));
}

// ── Cart step ─────────────────────────────────────────────────────────────────
function renderCartStep() {
  const list = document.getElementById("cart-items");
  list.innerHTML = "";
  PRODUCTS.filter(p => cart[p.id]).forEach(p => {
    const name = LANG === "ru" ? p.name_ru : p.name_uz;
    const qty  = cart[p.id];
    const div  = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${esc(p.image_url)}" alt="${esc(name)}"
           onerror="this.src='https://placehold.co/52x52/e0f2fe/0284c7?text=?'">
      <div class="ci-info">
        <div class="ci-name">${esc(name)} × ${qty}</div>
        <div class="ci-price">${fmt(qty * Number(p.price))}</div>
      </div>
      <button class="ci-remove" onclick="removeItem(${p.id})">✕</button>`;
    list.appendChild(div);
  });
  setText("ct-val", fmt(cartTotal()));
}

function removeItem(id) {
  delete cart[id];
  const el = document.getElementById("qty-" + id);
  if (el) el.textContent = 0;
  updateCartBar();
  if (!cartCount()) { showStep("step-products"); return; }
  renderCartStep();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goStep(id) {
  if (id === "step-phone" && !cartCount()) {
    alert(TX[LANG].err_cart); return;
  }
  if (id === "step-cart")     renderCartStep();
  if (id === "step-location") initMap();
  showStep(id);
}

function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) { el.classList.add("active"); window.scrollTo(0, 0); }
}

// ── Phone ─────────────────────────────────────────────────────────────────────
function phoneNext() {
  const digits = document.getElementById("inp-phone").value.replace(/\D/g, "");
  if (digits.length < 9) { alert(TX[LANG].err_phone); return; }
  goStep("step-location");
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap() {
  if (map) { setTimeout(() => map.invalidateSize(), 200); return; }
  const defLat = 41.2995, defLng = 69.2401;
  map = L.map("map").setView([defLat, defLng], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap",
  }).addTo(map);
  leafMarker = L.marker([defLat, defLng], { draggable: true }).addTo(map);
  markerLat = defLat; markerLng = defLng;
  updateCoords();
  leafMarker.on("dragend", e => {
    const p = e.target.getLatLng();
    markerLat = p.lat; markerLng = p.lng; updateCoords();
  });
  map.on("click", e => {
    leafMarker.setLatLng(e.latlng);
    markerLat = e.latlng.lat; markerLng = e.latlng.lng; updateCoords();
  });
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(({ coords: { latitude: lat, longitude: lng } }) => {
      map.setView([lat, lng], 15);
      leafMarker.setLatLng([lat, lng]);
      markerLat = lat; markerLng = lng; updateCoords();
    });
  }
  setTimeout(() => map.invalidateSize(), 300);
}

function updateCoords() {
  setText("coords-display",
    markerLat != null ? `${markerLat.toFixed(5)}, ${markerLng.toFixed(5)}` : "");
}

function locationNext() {
  if (markerLat == null) { alert(TX[LANG].err_location); return; }
  goStep("step-payment");
}

// ── Payment ───────────────────────────────────────────────────────────────────
function copyCard() {
  navigator.clipboard?.writeText(PAYMENT_CARD.replace(/\s/g, "")).then(() => {
    const btn = document.getElementById("p-copy");
    btn.textContent = TX[LANG].copied;
    setTimeout(() => btn.textContent = TX[LANG].copy, 2000);
  });
}

function handleScreenshot(input) {
  const file = input.files[0];
  if (!file) { alert("Fayl tanlanmadi"); return; }
  alert("Fayl tanlandi: " + file.name + " (" + file.size + " bytes)");
  const reader = new FileReader();
  reader.onerror = e => alert("FileReader xatosi: " + e);
  reader.onload = e => {
    alert("FileReader yukladi");
    const img = new Image();
    img.onerror = e => alert("Image yuklash xatosi: " + e);
    img.onload = () => {
      alert("Image yuklandi: " + img.width + "x" + img.height);
      try {
        const MAX = 800;
        const scale = img.width > MAX ? MAX / img.width : 1;
        const canvas = document.createElement("canvas");
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        screenshotB64 = canvas.toDataURL("image/jpeg", 0.8);
        alert("Base64 tayyor, uzunlik: " + screenshotB64.length);
        const preview = document.getElementById("preview-img");
        preview.src = screenshotB64; preview.style.display = "block";
        document.getElementById("upload-area").classList.add("has-file");
      } catch(e) {
        alert("Canvas xatosi: " + e.message);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Submit ────────────────────────────────────────────────────────────────────
function submitOrder() {
  document.getElementById("btn-send").disabled = true;

  const items = PRODUCTS
    .filter(p => cart[p.id])
    .map(p => ({
      id:    p.id,
      name:  LANG === "ru" ? p.name_ru : p.name_uz,
      price: Number(p.price),
      qty:   cart[p.id],
    }));

  const payload = {
    action:     "order",
    order_type: "product",
    items,
    total:     cartTotal(),
    phone:     document.getElementById("inp-phone").value.trim(),
    latitude:  markerLat,
    longitude: markerLng,
    address:   `${markerLat.toFixed(5)}, ${markerLng.toFixed(5)}`,
    has_screenshot: screenshotB64 ? true : false,
    comment:   document.getElementById("inp-comment").value.trim(),
  };

  try {
    tg.sendData(JSON.stringify(payload));
  } catch (e) {
    alert("Xato: " + e.message);
    document.getElementById("btn-send").disabled = false;
    return;
  }

  // Screenshot botga alohida rasm sifatida yuklanadi
  if (screenshotB64 && tg) {
    _sendScreenshot(screenshotB64);
  }

  showStep("step-success");
  setTimeout(() => { if (tg) tg.close(); }, 3000);
}

async function _sendScreenshot(b64) {
  // base64 -> blob -> tg.sendData works only for small data
  // Instead prompt user to send photo in chat after webapp closes
  // Screenshot is stored in sessionStorage for reference
  try { sessionStorage.setItem("pending_screenshot", b64); } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString("uz-UZ") + " so'm"; }
function esc(v) {
  return String(v ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

boot();
</script>
